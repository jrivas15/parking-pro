<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5CC2F"/>
      <stop offset="100%" style="stop-color:#D4920A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Gradiente dorado con esquinas redondeadas, sin fondo externo -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#goldTop)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#shine)"/>

  <!-- P blanca centrada -->
  <text
    x="512"
    y="512"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="660"
    font-weight="800"
    fill="#FFFFFF">P</text>
</svg>
